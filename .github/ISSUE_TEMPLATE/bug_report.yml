name: Bug report
description: Report a reproducible problem in the library or demo.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and the behavior you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide minimal reproduction steps or a small sample.
      placeholder: |
        1. Create a scene with...
        2. Trigger...
        3. Observe...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BlazorThree version
      placeholder: 0.1.0-preview
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host type
      options:
        - Blazor Server
        - Blazor WebAssembly
        - Both
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include browser, OS, and any relevant logs.